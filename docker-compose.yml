networks:
  trends-net:
    external: true

services:
  app:
    image: trends-py:latest
    build:
      context: .
      dockerfile: Dockerfile
    networks: [trends-net]
    ports:
      - "5001:5001"
    environment:
      DATABASE_URL: postgresql://trends:${DB_PASSWORD:-trends}@db:5432/trends
    restart: unless-stopped

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>trends | Terminal</title>
    <style>
        :root {
            --bg-primary: #080808;
            --bg-secondary: #0f0f0f;
            --bg-selected: rgba(0, 255, 127, 0.08);
            --text-main: #d1d1d1;
            --text-muted: #555;
            --accent: #00ff7f;
            --danger: #ff453a;
            --border: #222;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        body.light-mode {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-selected: rgba(0, 160, 80, 0.1);
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --border: #d2d2d7;
            --accent: #008040;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Header & Toolbar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: var(--bg-primary);
        }

        .brand { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.5px; }
        .status { font-size: 10px; font-weight: 700; }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .divider { width: 1px; height: 16px; background: var(--border); margin: 0 8px; }

        .action-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 5px 12px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 3px;
            text-transform: uppercase;
            font-weight: 600;
            transition: 0.15s;
        }
        .action-btn:hover:not(:disabled) { border-color: var(--text-muted); background: rgba(128,128,128,0.1); }
        .action-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        .btn-accent { color: var(--accent); border-color: var(--accent); }
        .btn-danger { color: var(--danger); border-color: var(--danger); }

        /* Main Grid */
        .grid-container {
            flex: 1;
            overflow: auto;
            background: var(--bg-secondary);
            min-height: 100px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            text-align: right;
            min-width: 1100px;
        }

        th {
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            padding: 12px 10px;
            color: var(--text-muted);
            font-size: 10px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            z-index: 2;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            font-family: var(--font-mono);
            transition: background 0.1s;
        }

        tr.selected td {
            background: var(--bg-selected) !important;
            border-bottom: 1px solid var(--accent);
        }

        .ticker-label { text-align: left; font-weight: 700; color: var(--text-main); }

        /* Real-time FX */
        .flash-up   { color: #00ff7f !important; background: rgba(0, 255, 127, 0.2) !important; transition: 0s; }
        .flash-down { color: #ff453a !important; background: rgba(255, 69, 58, 0.2) !important; transition: 0s; }
        .fade-out   { transition: background 0.5s ease, color 0.5s ease; }

        /* ── Splitter ──────────────────────────────────── */
        .splitter {
            height: 4px;
            background: var(--border);
            cursor: ns-resize;
            flex-shrink: 0;
            transition: background 0.2s;
            display: none;
        }
        .splitter:hover { background: var(--accent); }

        /* ── History Panel ─────────────────────────────── */
        .history-panel {
            height: 0;
            min-height: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }
        .history-panel.expanded {
            height: 220px;
        }

        /* header bar inside the panel */
        #history-header {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 7px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .history-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        /* Chart / Table toggle */
        .view-toggle { display: flex; }
        .toggle-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 3px 10px;
            font-size: 10px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 600;
            line-height: 1.6;
        }
        .toggle-btn:first-child { border-radius: 3px 0 0 3px; }
        .toggle-btn:last-child  { border-radius: 0 3px 3px 0; border-left: none; }
        .toggle-btn.active {
            background: var(--bg-selected);
            color: var(--accent);
            border-color: var(--accent);
        }

        /* Year picker */
        .year-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        .year-select {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 3px 8px;
            font-size: 11px;
            border-radius: 3px;
            cursor: pointer;
        }

        .close-btn { margin-left: auto; padding: 3px 10px; }

        /* Chart Controls */
        .chart-controls { display: flex; align-items: center; gap: 10px; font-size: 10px; color: var(--text-muted); }
        .chart-controls label { cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .chart-controls input { cursor: pointer; }

        /* Panel content area */
        #history-content {
            flex: 1;
            overflow: auto;
            position: relative;
        }
        #history-content.idle {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 11px;
            letter-spacing: 2px;
        }
        .history-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 11px;
            letter-spacing: 2px;
        }

        /* History table — inherits global th/td but with tighter padding */
        .history-table { min-width: 1100px; }
        .history-table td { padding: 7px 10px; }
        .history-table th { padding: 9px 10px; }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

<header>
    <div class="brand">trends</div>
    <div style="display:flex; align-items:center; gap:15px">
        <button class="action-btn" onclick="toggleTheme()" style="font-size:14px; padding:2px 8px">🌗</button>
        <div class="status" id="connection-status" style="color:var(--text-muted)">● CONNECTING</div>
    </div>
</header>

<nav class="toolbar">
    <button class="action-btn btn-accent" onclick="addTicker()">⊕ Add Ticker</button>
    <button class="action-btn" onclick="triggerSeedUpload()">↑ Upload Seed</button>
    <input type="file" id="fileInput" accept=".xlsx,.csv,.txt" style="display:none">

    <div class="divider"></div>

    <button id="btn-hist" class="action-btn" disabled onclick="openHistory()">View History</button>
    <button id="btn-del"  class="action-btn btn-danger" disabled onclick="removeTicker()">Remove Ticker</button>
</nav>

<div class="grid-container" id="grid-container">
    <table id="ticker-table">
        <thead>
            <tr>
                <th style="text-align:left">Ticker</th>
                <th>Date</th>
                <th>Close</th>
                <th>Open</th>
                <th>High</th>
                <th>Low</th>
                <th>H/L</th>
                <th>AVG</th>
                <th>EMA-5</th>
                <th>EMA-20</th>
                <th>RSI</th>
                <th>Support</th>
                <th>Bullish</th>
                <th>Alerts</th>
            </tr>
        </thead>
        <tbody id="ticker-body"></tbody>
    </table>
</div>

<div class="splitter" id="splitter"></div>

<!-- History Panel -->
<div class="history-panel" id="chart-area">

    <!-- Header (hidden until history is opened) -->
    <div id="history-header">
        <span class="history-title" id="history-title"></span>

        <div class="view-toggle">
            <button id="btn-view-chart" class="toggle-btn active" onclick="setHistoryView('chart')">Chart</button>
            <button id="btn-view-table" class="toggle-btn"        onclick="setHistoryView('table')">Table</button>
        </div>

        <div id="chart-series-controls" class="chart-controls">
            <label><input type="checkbox" id="show-bullish" checked onchange="updateSeriesVisibility()"> Bullish</label>
            <label><input type="checkbox" id="show-support" checked onchange="updateSeriesVisibility()"> Support</label>
        </div>

        <div style="display:flex;align-items:center;gap:6px">
            <span class="year-label">Year</span>
            <select id="year-picker" class="year-select" onchange="loadHistory()"></select>
        </div>

        <button class="action-btn close-btn" onclick="closeHistory()">✕ Close</button>
    </div>

    <!-- Content: idle placeholder, chart canvas, or history table -->
    <div id="history-content" class="idle">[ CHART_ENGINE_IDLE ]</div>
</div>

<script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="/static/terminal.js?v=5"></script>
</body>
</html>
